<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mayank Parmar - Python Developer & Backend Enthusiast</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: '#0a0a0a',
            neonCyan: '#00f0ff',
            neonPurple: '#b026ff',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            blob: 'blob 7s infinite',
          },
          keyframes: {
            blob: {
              '0%': {
                transform: 'translate(0px, 0px) scale(1)',
              },
              '33%': {
                transform: 'translate(30px, -50px) scale(1.1)',
              },
              '66%': {
                transform: 'translate(-20px, 20px) scale(0.9)',
              },
              '100%': {
                transform: 'translate(0px, 0px) scale(1)',
              },
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (To compile JSX in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <!-- Lucide Icons (We will use SVG strings or basic shapes since the CDN module requires specific handling, but we include it just in case) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-dark text-slate-200 font-sans antialiased overflow-x-hidden selection:bg-neonCyan selection:text-dark">
  <div id="root"></div>

  <!-- App Logic -->
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion } = window.Motion;

    // --- Icons (Simple SVGs as React Components) ---
    const DownloadIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>);
    const CodeIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>);
    const ServerIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>);
    const AutomationIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>);
    const MailIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>);
    const GithubIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>);
    const LinkedinIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>);
    const MenuIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>);
    const CloseIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);


    // --- Components ---

    const Navbar = () => {
      const [isOpen, setIsOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const links = ['About', 'Skills', 'Projects', 'Experience', 'Education', 'Contact'];

      return (
        <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-dark/80 backdrop-blur-md border-b border-white/10 py-3' : 'bg-transparent py-5'}`}>
          <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="#" className="flex items-center gap-3 hover:opacity-80 transition-opacity">
              <img src="files/profile_image.jpeg" alt="Mayank Parmar" className="w-10 h-10 md:w-12 md:h-12 rounded-full object-cover border-2 border-neonCyan/50 shadow-[0_0_10px_rgba(0,240,255,0.3)]" />
            </a>

            {/* Desktop Nav */}
            <div className="hidden md:flex gap-8 items-center">
              {links.map(link => (
                <a key={link} href={`#${link.toLowerCase()}`} className="text-sm font-medium text-slate-300 hover:text-neonCyan transition-colors">
                  {link}
                </a>
              ))}
              <div className="flex items-center gap-4">
                <a href="files/Mayank_Parmar_Resume_v2.pdf" download="Mayank_Parmar_Resume.pdf" className="px-4 py-2 rounded-full border border-neonPurple text-neonPurple hover:bg-neonPurple hover:text-white transition-all font-semibold text-sm flex items-center gap-2">
                  <DownloadIcon /> Resume
                </a>
                <a href="#contact" className="px-5 py-2 rounded-full border border-neonCyan text-neonCyan hover:bg-neonCyan hover:text-dark transition-all font-semibold text-sm">
                  Hire Me
                </a>
              </div>
            </div>

            {/* Mobile Nav Toggle */}
            <button className="md:hidden text-white" onClick={() => setIsOpen(!isOpen)}>
              {isOpen ? <CloseIcon /> : <MenuIcon />}
            </button>
          </div>

          {/* Mobile Menu */}
          {isOpen && (
            <motion.div
              initial={{ opacity: 0, y: -20 }}
              animate={{ opacity: 1, y: 0 }}
              className="md:hidden absolute top-full left-0 w-full bg-dark/95 backdrop-blur-lg border-b border-white/10 py-5 px-6 flex flex-col gap-4"
            >
              {links.map(link => (
                <a key={link} href={`#${link.toLowerCase()}`} onClick={() => setIsOpen(false)} className="text-lg font-medium text-slate-300 hover:text-neonCyan">
                  {link}
                </a>
              ))}
              <div className="h-px w-full bg-white/10 my-2"></div>
              <a href="files/Mayank_Parmar_Resume_v2.pdf" download="Mayank_Parmar_Resume.pdf" className="text-lg font-medium text-neonPurple flex items-center gap-2">
                <DownloadIcon /> Download Resume
              </a>
            </motion.div>
          )}
        </nav>
      );
    };

    const HeroSection = () => {
      return (
        <section id="home" className="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden">
          {/* Background Orbs */}
          <div className="absolute top-1/4 left-1/4 w-72 h-72 bg-neonCyan/20 rounded-full blur-[100px] animate-blob"></div>
          <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-neonPurple/20 rounded-full blur-[120px] animate-blob" style={{ animationDelay: '2s' }}></div>

          <div className="max-w-7xl mx-auto px-6 w-full grid lg:grid-cols-2 gap-12 items-center z-10">
            <motion.div
              initial={{ opacity: 0, x: -50 }}
              animate={{ opacity: 1, x: 0 }}
              transition={{ duration: 0.8 }}
            >
              <div className="inline-block px-4 py-1.5 mb-6 rounded-full glass-panel text-neonCyan font-mono text-sm font-medium border border-neonCyan/30">
                👋 Welcome to my portfolio
              </div>
              <h1 className="text-5xl md:text-7xl font-extrabold text-white leading-tight mb-6 tracking-tight">
                Hi, I'm <br />
                <span className="text-gradient">Mayank Parmar</span>
              </h1>
              <p className="text-xl md:text-2xl text-slate-400 mb-8 max-w-lg font-light leading-relaxed">
                Python Developer | <span className="text-white font-medium">Backend</span> & <span className="text-white font-medium">Workflow Automation</span> Enthusiast.
              </p>
              <div className="flex flex-wrap gap-4">
                <a href="#projects" className="px-8 py-3 rounded-full bg-neonCyan text-dark font-bold hover:shadow-[0_0_20px_rgba(0,240,255,0.4)] transition-all">
                  View My Work
                </a>
                <a href="#contact" className="px-8 py-3 rounded-full glass-panel text-white font-bold hover:border-neonPurple/50 hover:bg-neonPurple/10 transition-all flex items-center gap-2">
                  <MailIcon /> Contact Me
                </a>
              </div>
            </motion.div>

            <motion.div
              initial={{ opacity: 0, scale: 0.8 }}
              animate={{ opacity: 1, scale: 1 }}
              transition={{ duration: 0.8, delay: 0.2 }}
              className="relative hidden lg:block"
            >
              <div className="relative w-full aspect-square max-w-md mx-auto">
                {/* Minimalist Tech Illustration / Placeholder for Image */}
                <div className="absolute inset-0 rounded-full border-2 border-dashed border-white/20 animate-[spin_20s_linear_infinite]"></div>
                <div className="absolute inset-4 rounded-full border border-neonCyan/30 animate-[spin_15s_linear_infinite_reverse]"></div>
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="w-64 h-64 rounded-full overflow-hidden border-4 border-dark shadow-[0_0_50px_rgba(176,38,255,0.3)] bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center relative">
                    {/* Replace 'your-profile-image.jpg' with your actual image filename */}
                    <img src="files/profile_image.jpeg" alt="Mayank Parmar" className="w-full h-full object-cover" />
                  </div>
                </div>

                {/* Floating Badges */}
                <motion.div animate={{ y: [-10, 10, -10] }} transition={{ repeat: Infinity, duration: 4 }} className="absolute top-10 left-0 glass-panel px-4 py-2 rounded-xl flex items-center gap-2">
                  <CodeIcon /> <span className="font-mono text-sm text-white">Python</span>
                </motion.div>
                <motion.div animate={{ y: [10, -10, 10] }} transition={{ repeat: Infinity, duration: 5 }} className="absolute bottom-20 right-0 glass-panel px-4 py-2 rounded-xl flex items-center gap-2">
                  <AutomationIcon /> <span className="font-mono text-sm text-neonCyan">n8n</span>
                </motion.div>
              </div>
            </motion.div>
          </div>
        </section>
      );
    };

    const AboutSection = () => {
      return (
        <section id="about" className="py-24 relative">
          <div className="max-w-7xl mx-auto px-6">
            <motion.div
              initial={{ opacity: 0, y: 30 }}
              whileInView={{ opacity: 1, y: 0 }}
              viewport={{ once: true }}
              className="text-center mb-16"
            >
              <h2 className="text-3xl md:text-5xl font-bold text-white mb-4">About <span className="text-neonPurple">Me</span></h2>
              <div className="w-24 h-1 bg-gradient-to-r from-neonCyan to-neonPurple mx-auto rounded-full"></div>
            </motion.div>

            <div className="grid lg:grid-cols-3 gap-10 max-w-6xl mx-auto">
              {/* Text Content */}
              <div className="lg:col-span-2 glass-panel rounded-3xl p-8 md:p-10 text-lg text-slate-300 leading-relaxed relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-neonCyan/10 rounded-full blur-[50px]"></div>
                <p className="mb-6">
                  I am an IMSCIT student at GLS University with a strong interest in backend development, workflow automation, and practical software engineering.
                </p>

                <p className="mb-6">
                  I build applications using Python, Flask, JavaScript, APIs, and automation tools, focusing on creating systems that simplify workflows and improve productivity through integration and automation.
                </p>

                <p className="mb-6">
                  My projects include an AI-driven workflow automation system built with n8n, a full-stack Resume Builder platform, and API-based web applications. Through these projects, I have gained hands-on experience in backend development, database integration, and workflow orchestration.
                </p>

                <p>
                  Beyond development, I represented GLS University as a National Finalist in Smart India Hackathon (SIH) 2024, collaborating on a sustainable innovation project at the national level.
                </p>
              </div>

              {/* Resume Card */}
              <div className="lg:col-span-1 glass-panel rounded-3xl p-6 flex flex-col items-center justify-between text-center relative overflow-hidden group">
                <div className="absolute -bottom-10 -right-10 w-40 h-40 bg-neonPurple/10 rounded-full blur-[60px]"></div>
                <div className="w-full">
                  <h3 className="text-2xl font-bold text-white mb-2">My Resume</h3>
                  <p className="text-sm text-slate-400 mb-6">Download for full details</p>

                  {/* Resume Image */}
                  <a href="files/Mayank_Parmar_Resume_v2.pdf" download="Mayank_Parmar_Resume.pdf" className="w-full aspect-[1/1.4] bg-slate-800 rounded-xl border border-white/10 flex items-center justify-center relative overflow-hidden mb-6 group-hover:border-neonPurple/50 transition-colors block cursor-pointer">
                    {/* Replace 'your-resume-image.jpg' with your actual image filename */}
                    <img src="files/Mayank_Resume.jpg" alt="Resume Preview" className="w-full h-full object-cover relative z-20 group-hover:scale-105 transition-transform duration-500" />
                  </a>
                </div>

                {/* Replace 'your-resume.pdf' with your actual PDF filename */}
                <a href="files/Mayank_Parmar_Resume_v2.pdf" download="Mayank_Parmar_Resume.pdf" className="w-full py-3 rounded-xl bg-neonPurple text-white font-bold hover:shadow-[0_0_20px_rgba(176,38,255,0.4)] transition-all flex items-center justify-center gap-2 relative z-10">
                  <DownloadIcon /> Download PDF
                </a>
              </div>
            </div>
          </div>
        </section>
      );
    };

    const SkillsSection = () => {
      const skillCategories = [
        {
          title: "Programming Languages",
          skills: ["Python", "JavaScript", "C", "C++", "Core Java", "PHP", "SQL"],
          color: "from-blue-500 to-neonCyan"
        },
        {
          title: "Backend & Tools",
          skills: ["Flask", "REST APIs", "n8n", "Git & GitHub", "Postman", "MySQL", "PL/SQL", "Docker (Beginner)"],
          color: "from-purple-500 to-neonPurple"
        },
        {
          title: "Frontend Technologies",
          skills: ["HTML", "CSS", "JavaScript", "Responsive Design"],
          color: "from-pink-500 to-orange-400"
        },
        {
          title: "Concepts",
          skills: ["Workflow Automation", "API Integration", "Webhooks", "Backend Development", "Database Management", "Problem Solving"],
          color: "from-emerald-400 to-teal-500"
        }
      ];

      return (
        <section id="skills" className="py-24 bg-dark/50">
          <div className="max-w-7xl mx-auto px-6">
            <motion.div
              initial={{ opacity: 0, y: 30 }}
              whileInView={{ opacity: 1, y: 0 }}
              viewport={{ once: true }}
              className="text-center mb-16"
            >
              <h2 className="text-3xl md:text-5xl font-bold text-white mb-4">Technical <span className="text-neonCyan">Skills</span></h2>
              <div className="w-24 h-1 bg-gradient-to-r from-neonCyan to-neonPurple mx-auto rounded-full"></div>
            </motion.div>

            <div className="grid md:grid-cols-2 gap-8">
              {skillCategories.map((category, idx) => (
                <motion.div
                  key={category.title}
                  initial={{ opacity: 0, y: 20 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  viewport={{ once: true }}
                  transition={{ delay: idx * 0.1 }}
                  className="glass-panel p-8 rounded-2xl"
                >
                  <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-3">
                    <div className={`w-3 h-3 rounded-full bg-gradient-to-r ${category.color}`}></div>
                    {category.title}
                  </h3>
                  <div className="flex flex-wrap gap-3">
                    {category.skills.map(skill => (
                      <span key={skill} className="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:border-white/30 transition-colors cursor-default">
                        {skill}
                      </span>
                    ))}
                  </div>
                </motion.div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const ProjectCard = ({ project }) => {
      const [currentImg, setCurrentImg] = useState(0);
      const [isLightboxOpen, setIsLightboxOpen] = useState(false);

      const nextImg = (e) => {
        if (e) e.stopPropagation();
        if (project.images && project.images.length > 0) {
          setCurrentImg((prev) => (prev + 1) % project.images.length);
        }
      };

      const prevImg = (e) => {
        if (e) e.stopPropagation();
        if (project.images && project.images.length > 0) {
          setCurrentImg((prev) => (prev - 1 + project.images.length) % project.images.length);
        }
      };

      const hasMultipleImages = project.images && project.images.length > 1;
      const currentImageSrc = project.images && project.images.length > 0 ? project.images[currentImg] : project.imagePath;

      return (
        <>
          {/* Full Screen Lightbox Modal */}
          {isLightboxOpen && currentImageSrc && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4 backdrop-blur-sm">
              <button
                onClick={() => setIsLightboxOpen(false)}
                className="absolute top-6 right-6 w-12 h-12 rounded-full bg-white/10 text-white flex items-center justify-center hover:bg-neonPurple hover:text-white transition-all z-50"
              >
                <CloseIcon />
              </button>

              {/* Lightbox Image */}
              <div className="relative w-full max-w-6xl aspect-video flex items-center justify-center rounded-xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                <img src={currentImageSrc} alt={`${project.title} Fullscreen`} className="w-full h-full object-contain" />
              </div>

              {/* Lightbox Controls */}
              {hasMultipleImages && (
                <>
                  <button
                    onClick={prevImg}
                    className="absolute left-6 top-1/2 -translate-y-1/2 w-14 h-14 rounded-full bg-black/50 border border-white/20 text-white flex items-center justify-center hover:bg-neonCyan hover:text-dark transition-all z-50"
                  >
                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>
                  </button>
                  <button
                    onClick={nextImg}
                    className="absolute right-6 top-1/2 -translate-y-1/2 w-14 h-14 rounded-full bg-black/50 border border-white/20 text-white flex items-center justify-center hover:bg-neonCyan hover:text-dark transition-all z-50"
                  >
                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                  </button>
                  <div className="absolute bottom-8 left-1/2 -translate-x-1/2 text-white font-mono bg-black/50 px-4 py-2 rounded-full border border-white/10">
                    {currentImg + 1} / {project.images.length}
                  </div>
                </>
              )}
            </div>
          )}

          <motion.div
            initial={{ opacity: 0, y: 40 }}
            whileInView={{ opacity: 1, y: 0 }}
            viewport={{ once: true, margin: "-100px" }}
            className="glass-panel rounded-3xl overflow-hidden flex flex-col lg:flex-row group"
          >
            {/* Image Container */}
            {currentImageSrc && (
              <div
                onClick={() => setIsLightboxOpen(true)}
                className="lg:w-2/5 bg-slate-900 border-b lg:border-b-0 lg:border-r border-white/10 relative overflow-hidden min-h-[300px] flex items-center justify-center group/gallery cursor-zoom-in"
              >
                <div className="absolute inset-0 bg-gradient-to-br from-neonCyan/20 to-neonPurple/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-10 pointer-events-none"></div>

                {currentImageSrc ? (
                  <img src={currentImageSrc} alt={project.title} className="absolute inset-0 w-full h-full object-contain z-0 transition-transform duration-700 group-hover/gallery:scale-105" />
                ) : (
                  /* Visual Placeholder for User's Project Image (Fallback) */
                  <div className="flex-1 flex items-center justify-center text-center z-20">
                    <div>
                      <svg className="w-16 h-16 text-slate-700 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                      </svg>
                      <p className="text-slate-500 font-mono text-sm border border-slate-700 px-4 py-2 rounded-lg bg-slate-800/50">
                        [ Placeholder: {project.imagePlaceholder} ]
                      </p>
                    </div>
                  </div>
                )}

                {/* Arrow Buttons & Indicators */}
                {hasMultipleImages && (
                  <>
                    {/* Previous Button */}
